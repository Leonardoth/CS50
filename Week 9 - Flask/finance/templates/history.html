{% extends "layout.html" %}

{% block main %}
    <table class="table table-striped">
        <thead>
            <tr>
                <th class="text-start">Symbol</th>
                <th class="text-end">Type</th>
                <th class="text-end">Shares</th>
                <th class="text-end">Price</th>
                <th class="text-end">Total</th>
                <th class="text-end">Transacted</th>
            </tr>
        </thead>
        <tbody>

            {% for item in history %}
                <tr>
                    <td class="text-start">{{item.symbol}}</td>
                    <td class="text-end">{{item.type}}</td>
                    <td class="text-end">{{item.shares}}</td>
                    <td class="text-end">{{item.price | usd}}</td>
                    <td class="text-end">{{(item.price * item.shares) | usd}}</td>
                    <td class="text-end">{{item.transacted}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock %}
