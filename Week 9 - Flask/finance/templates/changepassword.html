{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
    <form action="/changepassword" method="post">
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" id="password" name="password" placeholder="Password" required type="password">
            <input class="form-control mx-auto w-auto" id="newpassword" name="newpassword" placeholder="New Password" required type="password">
            <small style="color: red;"></small>
            <input class="form-control mx-auto w-auto" id="confirmation" name="confirmation" placeholder="Confirm New Password" required type="password">
        </div>
        <button id="register" class="btn btn-primary" type="submit">Register</button>
    </form>

    <script>
        let newpassword = document.querySelector("#newpassword")
        let confirmation = document.querySelector("#confirmation")
        let button = document.querySelector("#register")
        let validationText = document.querySelector("small")

        confirmation.addEventListener('input', function () {
            if (newpassword.value != confirmation.value){
                validationText.innerText = "Passwords don't match."
                button.disabled = true
            }else{
                validationText.innerText = ""
                button.disabled = false
            }
        })

    </script>
{% endblock %}
