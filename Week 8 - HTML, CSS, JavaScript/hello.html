<!DOCTYPE html>

<head>
    <script>
        function greet(){
            let name = document.querySelector('#name').value;
            alert('hello, ' + name);
        }
    </script>
    <title>
        Hello
    </title>
    <body>
        <form onsubmit="greet(); return false;">
            <input autocomplete="off" autofocus id="name" name="name" placeholder="Name" type="Text">
            <input type="Submit">
        </form>

    </body>
</head>
